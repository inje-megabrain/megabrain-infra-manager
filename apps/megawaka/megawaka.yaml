---
# deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mega-wakaboard
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mega-wakaboard
  template:
    metadata:
      labels:
        app: mega-wakaboard
    spec:
      containers:
        - name: mega-waka-fe
          image: jongung/waka-fe:1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
        - name: mega-waka-be
          image: shonn/waka-be:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 18083
          env:
            - name: SQL_IP
              value: mega-wakaboard-db
            - name: SQL_ID
              value: root
            - name: SQL_PASSWORD
              value: mega123
            - name: SQL_PORT
              value: "3306"
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: mega-wakaboard
  labels:
    app: mega-wakaboard
spec:
  ports:
    - protocol : TCP
      port: 3000
      targetPort: 3000
  selector:
    app: mega-wakaboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mega-wakaboard-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "1000000m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: waka.megabrain.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mega-wakaboard
                port:
                  number: 3000
